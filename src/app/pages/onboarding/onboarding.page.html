<ion-content [fullscreen]="true">
<ion-grid class="ion-display-flex ion-flex-column ion-align-items-center ion-justify-content-center ion-padding" style="height: 100%;">
   
    <ion-row>
      <ion-img src="assets/Logo.svg" ></ion-img>
    </ion-row>

    <ion-row class="ion-text-center" style="margin-top: 1rem;" >
        <p><strong>BINX</strong> no es “otra alarma”. Es un apoyo para decidir qué hacer cuando suena.
        </p>
    </ion-row>

    <ion-row style="width: 100%;align-content: center;justify-content: center;">
      <ul style="line-height: 2rem;">
        <li>Hacerlo Ahora</li>
        <li>Postponer con intención</li>
        <li>Reprogramar con claridad</li>
      </ul>
    </ion-row>

    <ion-row class="ion-display-flex ion-flex-row" style="width: 100%; justify-content: space-evenly; margin-top: 2rem;">
      <ion-button color="medium" (click)="onStart()">Empezar</ion-button>
      <ion-button color="primary" (click)="onSkip()">Omitir</ion-button>
    </ion-row>
</ion-grid>
