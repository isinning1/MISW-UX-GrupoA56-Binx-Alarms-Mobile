<ion-content [fullscreen]="true" class="alarms-content">
  <div class="alarms-page">
    <header class="alarms-header">
      <button
        type="button"
        class="header-icon-button"
        aria-label="Ir al perfil"
        (click)="onOpenUser()"
      >
        <ion-icon name="person-circle-outline"></ion-icon>
      </button>

      <div class="alarms-header__title-wrap">
        <h1 class="alarms-header__title">Alarmas</h1>
      </div>

      <button
        type="button"
        class="header-icon-button"
        aria-label="Abrir preferencias"
        (click)="onOpenMenu()"
      >
        <ion-icon name="ellipsis-horizontal"></ion-icon>
      </button>
    </header>

    <section class="alarms-list" aria-label="Listado de alarmas">
      <button
        *ngFor="let alarm of filteredAlarms; trackBy: trackByAlarmId"
        type="button"
        class="alarm-card"
        (click)="onOpenAlarm(alarm)"
      >
        <div class="alarm-card__leading">
          <div
            class="leading-icon"
            [class.leading-icon--pending]="isPending(alarm)"
            [class.leading-icon--attended]="isAttended(alarm)"
            aria-hidden="true"
          >
            <span *ngIf="isPending(alarm)" class="leading-icon__bang">!</span>

            <ion-icon
              *ngIf="isAttended(alarm)"
              name="notifications-sharp"
              class="leading-icon__bell"
            ></ion-icon>
          </div>
        </div>

        <div class="alarm-card__content">
          <div class="alarm-card__top">
            <h2 class="alarm-card__title">{{ alarm.title }}</h2>
            <p class="alarm-card__time">{{ formatTime(alarm.time) }}</p>
          </div>

          <div class="alarm-card__middle">
            <span class="category-chip">
              {{ getCategoryLabel(alarm.category) }}
            </span>
          </div>

          <div class="alarm-card__bottom">
            <span
              class="status-line"
              [class.status-line--pending]="isPending(alarm)"
              [class.status-line--attended]="isAttended(alarm)"
            >
              <ng-container *ngIf="isPending(alarm)">
                <ion-icon name="warning-outline" class="status-line__triangle"></ion-icon>
              </ng-container>

              <ng-container *ngIf="isAttended(alarm)">
                <span class="status-line__square status-line__square--filled">
                  <ion-icon name="checkmark-outline" class="status-line__check"></ion-icon>
                </span>
              </ng-container>

              <span class="status-line__text">{{ getStatusLabel(alarm.status) }}</span>
            </span>

            <span class="alarm-card__date">{{ alarm.dateLabel }}</span>
          </div>
        </div>

        <div class="alarm-card__actions">
          <button
            type="button"
            class="action-button action-button--edit"
            aria-label="Editar alarma"
            (click)="onEditAlarm(alarm, $event)"
          >
            <ion-icon
              name="create-outline"
              class="action-button__icon action-button__icon--edit"
            ></ion-icon>
          </button>

          <button
            type="button"
            class="action-button action-button--delete"
            aria-label="Eliminar alarma"
            (click)="onDeleteAlarm(alarm.id, $event)"
          >
            <ion-icon
              name="trash-outline"
              class="action-button__icon action-button__icon--delete"
            ></ion-icon>
          </button>
        </div>
      </button>

      <div class="alarms-empty" *ngIf="filteredAlarms.length === 0">
        <p class="alarms-empty__title">No se encontraron alarmas</p>
        <p class="alarms-empty__text">Intenta con otro término de búsqueda.</p>
      </div>
    </section>

    <footer class="alarms-bottom-bar">
      <button
        type="button"
        class="bottom-mini-button"
        aria-label="Menú"
        (click)="onOpenMenu()"
      >
        <ion-icon name="menu-outline"></ion-icon>
      </button>

      <label class="search-shell" aria-label="Buscar alarma">
        <ion-icon name="search-outline" class="search-shell__icon"></ion-icon>

        <input
          type="text"
          [(ngModel)]="searchTerm"
          placeholder="Buscar alarma..."
          aria-label="Buscar alarma"
        />

        <button
          type="button"
          class="search-shell__voice"
          aria-label="Buscar por voz"
          (click)="onSearchVoice()"
        >
          <ion-icon name="mic-outline"></ion-icon>
        </button>
      </label>

      <button
        type="button"
        class="bottom-notify-button"
        aria-label="Notificaciones"
        (click)="onQuickNotifications()"
      >
        <ion-icon name="notifications-outline"></ion-icon>
      </button>
    </footer>
  </div>
</ion-content>
