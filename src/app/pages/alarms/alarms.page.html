<ion-content [fullscreen]="true">
  <div class="alarms-page">
    <header class="alarms-header">
      <button
        type="button"
        class="alarms-header__icon-button alarms-header__icon-button--soft"
        (click)="onOpenUser()"
        aria-label="Abrir perfil de usuario"
        title="Abrir perfil de usuario"
      >
        <ion-icon name="person-outline" class="alarms-icon alarms-icon--sm"></ion-icon>
      </button>

      <h1 class="alarms-header__title">Alarmas</h1>

      <div class="alarms-header__actions">
        <button
          type="button"
          class="alarms-header__icon-button alarms-header__icon-button--soft"
          (click)="onMoreOptions()"
          aria-label="Más opciones"
          title="Más opciones"
        >
          <ion-icon
            name="ellipsis-horizontal"
            class="alarms-icon alarms-icon--sm"
          ></ion-icon>
        </button>

        <div
          class="alarms-header__menu"
          *ngIf="isOptionsOpen"
          aria-label="Menú de opciones"
        >
          <button
            type="button"
            class="alarms-header__menu-item"
            (click)="onOpenNotifications()"
          >
            Abrir alarma seleccionada
          </button>

          <button
            type="button"
            class="alarms-header__menu-item"
            (click)="onMoreOptions()"
          >
            Cerrar
          </button>
        </div>
      </div>
    </header>

    <section class="alarms-list" aria-label="Listado de alarmas">
      <article
        class="alarm-row"
        *ngFor="let alarm of filteredAlarms; trackBy: trackByAlarmId"
        [class.alarm-row--selected]="isSelected(alarm)"
      >
        <button
          type="button"
          class="alarm-row__main"
          (click)="onOpenAlarm(alarm)"
          (focus)="onSelectAlarm(alarm)"
          aria-label="Abrir alarma {{ getAlarmTitle(alarm) }}"
          title="Abrir alarma {{ getAlarmTitle(alarm) }}"
        >
          <div class="alarm-row__icon-wrap">
            <ion-icon
              [name]="getAlarmIconName(alarm)"
              [ngClass]="getAlarmIconClass(alarm)"
            ></ion-icon>
          </div>

          <div class="alarm-row__content">
            <div class="alarm-row__top">
              <div class="alarm-row__title-wrap">
                <h2 class="alarm-row__title">{{ getAlarmTitle(alarm) }}</h2>

                <div class="alarm-row__meta-left">
                  <span
                    class="alarm-category"
                    [ngClass]="getCategoryClass(alarm.category)"
                  >
                    {{ getCategoryLabel(alarm.category) }}
                  </span>
                </div>
              </div>

              <div class="alarm-row__meta-right">
                <span class="alarm-row__time">{{ alarm.time }}</span>
                <span class="alarm-row__date">{{ getReadableDateLabel(alarm) }}</span>
              </div>
            </div>

            <div class="alarm-row__bottom">
              <span [ngClass]="getStatusClass(alarm)">
                <ion-icon
                  [name]="getStatusIcon(alarm)"
                  class="alarms-icon alarms-icon--xs"
                ></ion-icon>
                {{ getStatusLabel(alarm) }}
              </span>

              <span
                class="alarm-row__critical-tag"
                *ngIf="alarm.critical"
              >
                Crítica
              </span>
            </div>
          </div>
        </button>

        <div class="alarm-row__actions">
          <button
            type="button"
            class="alarm-row__action-button alarm-row__action-button--edit"
            (click)="onEditAlarm(alarm)"
            (focus)="onSelectAlarm(alarm)"
            aria-label="Editar alarma {{ getAlarmTitle(alarm) }}"
            title="Editar alarma {{ getAlarmTitle(alarm) }}"
          >
            <ion-icon name="create-outline" class="alarms-icon alarms-icon--sm"></ion-icon>
          </button>

          <button
            type="button"
            class="alarm-row__action-button alarm-row__action-button--delete"
            (click)="onDeleteAlarm(alarm)"
            aria-label="Eliminar alarma {{ getAlarmTitle(alarm) }}"
            title="Eliminar alarma {{ getAlarmTitle(alarm) }}"
          >
            <ion-icon name="trash-outline" class="alarms-icon alarms-icon--sm"></ion-icon>
          </button>
        </div>
      </article>

      <div class="alarms-empty" *ngIf="filteredAlarms.length === 0">
        <p class="alarms-empty__text">No se encontraron alarmas.</p>
      </div>
    </section>

    <footer class="alarms-bottom-bar" aria-label="Barra inferior">
      <button
        type="button"
        class="alarms-bottom-bar__menu-button"
        (click)="onOpenMenu()"
        aria-label="Abrir menú"
        title="Abrir menú"
      >
        <ion-icon name="menu-outline" class="alarms-icon alarms-icon--sm"></ion-icon>
      </button>

      <label class="alarms-search" aria-label="Buscar alarma">
        <ion-icon name="search-outline" class="alarms-icon alarms-icon--sm"></ion-icon>

        <input
          class="alarms-search__input"
          type="text"
          [(ngModel)]="searchTerm"
          placeholder="Buscar alarma..."
          aria-label="Buscar alarma"
        />

        <button
          type="button"
          class="alarms-search__voice-button"
          (click)="onVoiceSearch()"
          aria-label="Buscar por voz"
          title="Buscar por voz"
        >
          <ion-icon name="mic-outline" class="alarms-icon alarms-icon--sm"></ion-icon>
        </button>
      </label>

      <button
        type="button"
        class="alarms-bottom-bar__alert-button"
        (click)="onOpenNotifications()"
        aria-label="Ver alarma seleccionada"
        title="Ver alarma seleccionada"
      >
        <ion-icon
          name="notifications-outline"
          class="alarms-icon alarms-icon--sm"
        ></ion-icon>
      </button>
    </footer>
  </div>
</ion-content>
